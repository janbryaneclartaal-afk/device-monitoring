  :root {

    --panel-2: #142647;
    --border: #1f3358;
    --text: #e6ecf5;
    --text-dim: #93a4c0;
    --text-mute: #6b7d9b;
    --accent: #22d3ee;
    --accent-2: #06b6d4;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
    --purple: #a855f7;
    --yellow: #eab308;
    --blue: #3b82f6;
    /* Light-tinted background for expanded rows — varies per theme for clearer view */
    --expanded-bg: #16284a;
    --expanded-border: #2a4475;
  }
  [data-theme="light"] {
    --bg: #f6f8fc;
    --bg-soft: #ffffff;
    --panel: #ffffff;
    --panel-2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-dim: #475569;
    --text-mute: #94a3b8;
    --expanded-bg: #ecfeff;
    --expanded-border: #a5f3fc;
  }
  [data-theme="forest"] {
    --bg: #0a1f17;
    --bg-soft: #0f2a1e;
    --panel: #14352a;
    --panel-2: #1a4536;
    --border: #2a5d49;
    --accent: #10b981;
    --accent-2: #059669;
    --expanded-bg: #1c4d3a;
    --expanded-border: #2f6b54;
  }
  [data-theme="sunset"] {
    --bg: #1a0f1f;
    --bg-soft: #2a1530;
    --panel: #341a3d;
    --panel-2: #45224f;
    --border: #5d2e68;
    --accent: #f59e0b;
    --accent-2: #ec4899;
    --expanded-bg: #4a2855;
    --expanded-border: #6b3d78;
  }
  [data-theme="mono"] {
    --bg: #0d0d0d;
    --bg-soft: #161616;
    --panel: #1f1f1f;
    --panel-2: #2a2a2a;
    --border: #3a3a3a;
    --accent: #ffffff;
    --accent-2: #d4d4d4;
    --expanded-bg: #303030;
    --expanded-border: #4a4a4a;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
  }
  .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.06); }
  .panel-2 { background: var(--panel-2); }
  .text-dim { color: var(--text-dim); }
  .text-mute { color: var(--text-mute); }
  .border-c { border-color: rgba(255,255,255,0.06); }
  .accent-bg { background: var(--accent); color: #001018; }
  .accent-text { color: var(--accent); }
  .scroll-soft::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-soft::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .scroll-soft::-webkit-scrollbar-track { background: transparent; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .badge-online { background: rgba(34,197,94,0.12); color: #4ade80; border:1px solid rgba(34,197,94,0.3); }
  .badge-monitoring { background: rgba(249,115,22,0.12); color: #fb923c; border:1px solid rgba(249,115,22,0.3); }
  .badge-offline { background: rgba(239,68,68,0.12); color: #f87171; border:1px solid rgba(239,68,68,0.3); }
  .badge-noheartbeat { background: rgba(107,125,155,0.15); color: #94a3b8; border:1px solid rgba(107,125,155,0.3); }
  .badge-backlog { background: rgba(168,85,247,0.12); color: #c084fc; border:1px solid rgba(168,85,247,0.3); }
  .badge-ongoing { background: rgba(59,130,246,0.12); color: #60a5fa; border:1px solid rgba(59,130,246,0.3); }
  .badge-action { background: rgba(34,211,238,0.12); color: #22d3ee; border:1px solid rgba(34,211,238,0.3); }
  .badge-resolved { background: rgba(34,197,94,0.18); color: #4ade80; border:1px solid rgba(34,197,94,0.4); }
  .input { background: var(--bg-soft); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 14px; width: 100%; }
  .input:focus { outline: none; border-color: var(--accent); }
  .btn { display:inline-flex; align-items:center; gap:8px; padding: 9px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .btn-primary { background: var(--accent); color: #001018; }
  .btn-primary:hover { background: var(--accent-2); }
  .btn-ghost { background: var(--panel-2); color: var(--text); border-color: var(--border); }

  .btn-success { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .btn-success:hover { background: rgba(34,197,94,0.25); }
  .tab-btn { padding: 12px 4px; border-bottom: 2px solid transparent; color: var(--text-dim); font-weight: 500; cursor: pointer; font-size: 14px; }
  .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .nav-item { display:flex; align-items:center; gap:12px; padding: 10px 14px; border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: 500; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: auto; }
  th { text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--panel-2); white-space: nowrap; }
  td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  td.wrap { white-space: normal; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .offline-table td.col-status { max-width: 220px; }
  .offline-table td.col-issue { max-width: 180px; }
  .offline-table td.col-storename, .offline-table td.col-deviceid, .offline-table td.col-days, .offline-table td.col-category, .offline-table td.col-type { white-space: nowrap; }
  .row-highlight-green td { background: rgba(34,197,94,0.08) !important; border-left: 3px solid #22c55e; }
  .row-highlight-orange td { background: rgba(249,115,22,0.08) !important; border-left: 3px solid #f97316; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; background: var(--panel); border: 1px solid var(--border); z-index: 100; max-width: 400px; }
  .toast.success { border-color: rgba(34,197,94,0.4); }
  .toast.warn { border-color: rgba(249,115,22,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .stat-card { background: var(--panel); border:1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-num { font-size: 32px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .pill-mini { display:inline-flex; align-items:center; gap:4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  /* Light themed background for expanded rows — adapts per theme */
  .expanded-row { background: var(--expanded-bg) !important; border-top: 2px solid var(--expanded-border); border-bottom: 2px solid var(--expanded-border); }

  .link-chip:hover { background: var(--panel); }
</style>

// ============= SEED DATA (one-time auto-import on first load) =============
// Auto-populates Returns to RateIt, Closed Sites, and Stolen / Damaged / Lost
// from the historical CSVs. Only runs once per browser; persists to Google Sheets.
// Guarded by localStorage flag AND by checking that target arrays are still empty,
// so it never duplicates rows even across browsers.
async function seedInitialDataIfNeeded() {
  const FLAG = "dmh_seed_v1_applied";
  try { if (localStorage.getItem(FLAG)) return; } catch (e) {}
  // Only seed if all three target arrays are empty in Google Sheets
  if (state.returnsToRateIt.length > 0 || state.closedSites.length > 0 || state.stolenDamagedLost.length > 0) {
    try { localStorage.setItem(FLAG, "1"); } catch (e) {}
    return;
  }
  try {
    state.returnsToRateIt = SEED_DATA.returnsToRateIt.map(x => ({...x}));
    state.closedSites = SEED_DATA.closedSites.map(x => ({...x}));
    state.stolenDamagedLost = SEED_DATA.stolenDamagedLost.map(x => ({...x}));
    showToast(
      "Importing initial data: " + SEED_DATA.returnsToRateIt.length + " returns, " +
      SEED_DATA.closedSites.length + " closed sites, " + SEED_DATA.stolenDamagedLost.length + " stolen/damaged/lost…",
      "success", 4000
    );
    await Promise.all([
      saveKey("returnsToRateIt"),
      saveKey("closedSites"),
      saveKey("stolenDamagedLost"),
    ]);
    try { localStorage.setItem(FLAG, "1"); } catch (e) {}
    showToast("Initial data imported and saved to Google Sheets.", "success", 4000);
  } catch (e) {
    console.error("Seed failed:", e);
    showToast("Seed failed: " + e.message, "error", 6000);
  }
}

    && GOOGLE_CLIENT_ID && GOOGLE_CLIENT_ID !== "PASTE_YOUR_GOOGLE_OAUTH_CLIENT_ID_HERE" && GOOGLE_CLIENT_ID.endsWith(".apps.googleusercontent.com");

function isSignedIn() {

function parseJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  } catch (e) { return {}; }

function handleCredentialResponse(response) {

  _auth.idToken = response.credential;

  _auth.name = payload.name || _auth.email;
  _auth.picture = payload.picture || null;
  _auth.expiresAt = (payload.exp || 0) * 1000;
  try { sessionStorage.setItem("dmh_auth", JSON.stringify(_auth)); } catch (e) {}

      }

// ============= STORAGE (Google Sheets via Apps Script + Auth) =============
let _saveQueue = Promise.resolve();
let _pendingSaves = 0;

async function api(action, data) {
  if (!isConfigured()) throw new Error("API_URL or GOOGLE_CLIENT_ID not configured.");
  if (!isSignedIn() && action !== "ping") throw new Error("Not signed in.");
  const res = await fetch(API_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, data, idToken: _auth.idToken }),
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  if (json.error) {
    if (json.code === "NOT_ALLOWED") {
      showNotAllowedScreen(json.email || _auth.email);
      throw new Error(json.error);
    }
    if (json.code === "BAD_TOKEN" || json.code === "NO_TOKEN") {
      signOut();
      throw new Error("Session expired. Please sign in again.");
    }
    throw new Error(json.error);
  }
  return json;
}

async function loadState() {
  try {

  } catch (e) {}

    const result = await api("load");

    state.resolvedCases = d.resolvedCases || [];
    state.noHeartbeat = d.noHeartbeat || [];
    state.newRollout = d.newRollout || [];
    state.returnsToRateIt = d.returnsToRateIt || [];
    state.resolvedReturns = d.resolvedReturns || [];
    state.closedSites = d.closedSites || [];
    state.stolenDamagedLost = d.stolenDamagedLost || [];
    state.lastUpload = d.lastUpload || null;

    // If backend returned nothing for a new-tab key (e.g. older Code.gs without the column),
    // restore from localStorage cache so the user's records don't disappear on reload.
    // Once the backend is updated, the next save will overwrite the local cache from server-of-record.
    const restoreFromCache = (key) => {
      try {
        if (!state[key] || state[key].length === 0) {
          const cached = localStorage.getItem("dmh_cache_" + key);
          if (cached) {
            const parsed = JSON.parse(cached);
            if (Array.isArray(parsed) && parsed.length > 0) {
              state[key] = parsed;

            }

        }
      } catch (e) {}
    };
    restoreFromCache("returnsToRateIt");
    restoreFromCache("resolvedReturns");
    restoreFromCache("closedSites");
    restoreFromCache("stolenDamagedLost");
    // Coerce numeric values to strings (Google Sheets returns "83514" as a number)
    normalizeStringFields(state.stores, ['storeName','suffix','deviceId','fieldManager','fieldManagerEmail']);
    normalizeStringFields(state.offlineDevices, ['storeName','deviceId','deviceType','currentStatus','issueCaseNote','fieldManager','fieldManagerEmail','comment','deviceStatusOverride']);
    normalizeStringFields(state.resolvedCases, ['storeName','deviceId','deviceType','currentStatus','issueCaseNote','fieldManager','fieldManagerEmail','comment','category']);
    normalizeStringFields(state.noHeartbeat, ['storeName','deviceId','source']);
    normalizeStringFields(state.newRollout, ['storeName','deviceId']);
    normalizeStringFields(state.returnsToRateIt, ['id','store','cohoStore','deviceIdReplacement','issue','replacementTrackingLink','deviceStatus','deviceStatusOther','deviceIdFaulty','deviceReturnedToRateIt','faultyTrackingLink','fieldManager']);
    normalizeStringFields(state.resolvedReturns, ['id','store','cohoStore','deviceIdReplacement','issue','replacementTrackingLink','deviceStatus','deviceStatusOther','deviceIdFaulty','deviceReturnedToRateIt','faultyTrackingLink','fieldManager','status']);
    normalizeStringFields(state.closedSites, ['id','storeName','deviceId','deviceStatus','closureDates','ticketNo','notesTracking']);
    normalizeStringFields(state.stolenDamagedLost, ['id','storeName','deviceId','status','notes','portalStatus']);
    // Ensure all existing resolved returns are marked as "Resolved"
    let migrated = false;
    for (const r of state.resolvedReturns) {
      if (r.status !== "Resolved") { r.status = "Resolved"; migrated = true; }
    }
    if (migrated) { try { saveKey("resolvedReturns"); } catch (e) {} }

    // Migrate alternateSurvey from old boolean format to Yes/No/"" string format
    // (old data: true/false; new schema: "Yes"/"No"/"")
    const migrateAltSurvey = (arr) => {
      for (const r of arr) {
        if (r.alternateSurvey === true) r.alternateSurvey = "Yes";
        else if (r.alternateSurvey === false) r.alternateSurvey = "";
        // strings "Yes"/"No"/"" left as-is
      }
    };
    migrateAltSurvey(state.returnsToRateIt);
    migrateAltSurvey(state.resolvedReturns);

    // Migrate stolen/damaged/lost: normalize status to one of the 3 dropdown options.
    // Old data has values like "Stolen Tablet | 08/04/25" — map prefix and preserve date in notes.
    const migrateStolenStatus = () => {
      let any = false;
      for (const s of state.stolenDamagedLost) {
        const raw = (s.status || "").trim();
        if (!raw) continue;
        // Already a valid dropdown value? leave it.
        if (raw === "Lost Tablet" || raw === "Permanent Store Closure" || raw === "Damaged Device") continue;
        let mapped = "";
        const lower = raw.toLowerCase();
        if (lower.startsWith("stolen") || lower.startsWith("lost")) mapped = "Lost Tablet";
        else if (lower.includes("permanent") || lower.includes("closure")) mapped = "Permanent Store Closure";
        else if (lower.includes("damaged") || lower.includes("broken")) mapped = "Damaged Device";
        if (mapped) {
          // Preserve any extra info (like "| 08/04/25") in notes
          const extra = raw.replace(/^(stolen tablet|lost tablet|damaged|damaged device|permanent store closure)\s*/i, "").trim();
          if (extra && extra !== raw && !(s.notes || "").includes(extra)) {
            s.notes = ((s.notes || "") + (s.notes ? " | " : "") + "Original: " + raw).trim();
          }
          s.status = mapped;
          any = true;
        }
      }
      if (any) { try { saveKey("stolenDamagedLost"); } catch (e) {} }
    };
    migrateStolenStatus();

    // Migrate closed sites closureDates → parse out the ISO date into closureDateIso
    // so the date picker has a real value, while preserving the original text.
    const migrateClosedDates = () => {
      let any = false;
      for (const c of state.closedSites) {
        if (c.closureDateIso) continue;
        const txt = (c.closureDates || "").trim();
        if (!txt) continue;
        const iso = parseClosureDateText(txt);
        if (iso) { c.closureDateIso = iso; any = true; }
      }
      if (any) { try { saveKey("closedSites"); } catch (e) {} }
    };
    migrateClosedDates();

    // Always sync FM info from Stores (the source of truth for FM)
    syncFieldManagerFromStores();
  } catch (e) {
    console.warn("Load failed:", e);
    showToast("Failed to load: " + e.message, "error", 6000);
  }
}

// Coerce specified fields to strings so .localeCompare()/.toLowerCase() never fail
function normalizeStringFields(arr, fields) {
  if (!Array.isArray(arr)) return;
  for (const item of arr) {
    if (!item) continue;
    for (const f of fields) {
      if (item[f] !== null && item[f] !== undefined && typeof item[f] !== 'string') {
        item[f] = String(item[f]);
      }
    }
  }
}

// Look up the current Field Manager / FM Email for a device from the latest store data.
// Returns the value from state.stores if available, otherwise falls back to the saved value.
function getStoreFieldManager(deviceId, fallback) {
  const s = state.stores.find(x => x.deviceId === deviceId);
  return (s && s.fieldManager) ? s.fieldManager : (fallback || "");
}
function getStoreFieldManagerEmail(deviceId, fallback) {
  const s = state.stores.find(x => x.deviceId === deviceId);
  return (s && s.fieldManagerEmail) ? s.fieldManagerEmail : (fallback || "");
}

// Sync Field Manager + email from Stores → Offline/Resolved/etc. after any load or upload.
function syncFieldManagerFromStores() {
  for (const arr of [state.offlineDevices, state.resolvedCases]) {
    for (const item of arr) {
      const s = state.stores.find(x => x.deviceId === item.deviceId);
      if (s) {
        if (s.fieldManager) item.fieldManager = s.fieldManager;
        if (s.fieldManagerEmail) item.fieldManagerEmail = s.fieldManagerEmail;
      }
    }
  }
}

// Keys that may not exist on older backends — frontend caches them locally as a fallback
// so records survive page reloads even when Code.gs hasn't been redeployed.
const LOCAL_FALLBACK_KEYS = new Set(["returnsToRateIt", "resolvedReturns", "closedSites", "stolenDamagedLost"]);

function saveKey(key) {
  if (key === "profile") {
    try { localStorage.setItem("dmh_profile", JSON.stringify(state.profile)); } catch (e) {}
    return Promise.resolve();
  }
  // Always cache new-tab data to localStorage so it survives reload even if the backend rejects it.
  if (LOCAL_FALLBACK_KEYS.has(key) && Array.isArray(state[key])) {
    try { localStorage.setItem("dmh_cache_" + key, JSON.stringify(state[key])); } catch (e) {}
  }
  if (!isConfigured() || !isSignedIn()) return Promise.resolve();
  _pendingSaves++;
  setSaveIndicator();
  const value = JSON.parse(JSON.stringify(state[key]));
  _saveQueue = _saveQueue.then(async () => {
    try {
      await api("save", { key, value });
    } catch (e) {
      const isUnknownKey = /Unknown key:/i.test(e.message || "");
      if (isUnknownKey && LOCAL_FALLBACK_KEYS.has(key)) {
        // Old Code.gs deployment that doesn't recognize this key.
        // The data is already in localStorage (above) so the user won't lose it.
        showBackendOutdatedNotice();
      } else {
        console.warn("Save failed:", key, e);
        showToast("Save failed: " + e.message, "error", 5000);
      }
    } finally {
      _pendingSaves--;
      setSaveIndicator();
    }
  });
  return _saveQueue;
}

// Show a one-time-per-session helpful notice when the backend is behind the frontend.
function showBackendOutdatedNotice() {
  try {
    if (sessionStorage.getItem("dmh_outdated_notice_shown")) return;
    sessionStorage.setItem("dmh_outdated_notice_shown", "1");
  } catch (e) {}
  showToast(
    "Records are being saved to your browser only. Your Code.gs backend needs to be re-deployed " +
    "as a New version to sync with Google Sheets. See deployment instructions.",
    "error", 9000
  );
}

function saveAll() {
  return Promise.all([
    "stores","offlineDevices","resolvedCases","noHeartbeat","newRollout","returnsToRateIt","resolvedReturns","closedSites","stolenDamagedLost","profile","lastUpload"
  ].map(saveKey));
}

// ============= HELPERS =============
function applyTheme() {
  const t = state.profile.theme || "default";
  if (t === "default") document.body.removeAttribute("data-theme");
  else document.body.setAttribute("data-theme", t);
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function fmtDate(s) {
  if (!s) return "—";
  if (s === "New Device Added" || s === "Device not Available from Latest Update") return s;
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
}
function fmtDateShort(s) {
  if (!s) return "—";
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function daysBetween(from, to = new Date()) {
  if (!from) return null;
  const d1 = new Date(from);
  if (isNaN(d1)) return null;
  const ms = to.getTime() - d1.getTime();
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}
// Returns true if a store's latestHeartbeat doesn't represent a real, parseable timestamp.
// Covers: null/undefined/empty, placeholder strings, and any unparseable values.
function hasNoHeartbeat(latestHeartbeat) {
  if (!latestHeartbeat) return true;
  if (latestHeartbeat === "New Device Added") return true;
  if (latestHeartbeat === "Device not Available from Latest Update") return true;
  const d = new Date(latestHeartbeat);
  return isNaN(d.getTime());
}
function deviceStatusFromHeartbeat(latestHeartbeat) {
  if (hasNoHeartbeat(latestHeartbeat)) return "No Heartbeat";
  const days = daysBetween(latestHeartbeat);
  if (days === null) return "No Heartbeat";
  if (days < 1) return "Online";
  if (days <= 3) return "Monitoring";
  return "Offline";
}
function statusBadge(status) {
  const map = {
    "Online": "badge-online",
    "Monitoring": "badge-monitoring",
    "Offline": "badge-offline",
    "No Heartbeat": "badge-noheartbeat",
  };
  if (status && status.startsWith("Action Required")) return "badge-action";
  if (status === "Device not Available from Latest Update") return "badge-noheartbeat";
  if (status === "Online") return "badge-online";
  if (status === "Backlog") return "badge-backlog";
  if (status === "Ongoing ticket" || status === "Ongoing Ticket") return "badge-ongoing";
  if (status === "Resolved") return "badge-resolved";
  return map[status] || "badge-noheartbeat";
}
function showToast(msg, kind = "success", timeout = 3000) {
  state.toast = { msg, kind };
  render();
  if (timeout) setTimeout(() => { if (state.toast && state.toast.msg === msg) { state.toast = null; render(); } }, timeout);
}
function confirmDialog(msg, onConfirm) {
  state.modal = { type: "confirm", msg, onConfirm };
  render();
}
function closeModal() { state.modal = null; render(); }

// ============= DERIVED VIEWS =============
function storesWithStatus() {
  return state.stores.map(s => {
    // If device is in offlineDevices, its "All Stores" status reflects updates
    const offline = state.offlineDevices.find(o => o.deviceId === s.deviceId);
    let baseStatus = deviceStatusFromHeartbeat(s.latestHeartbeat);
    // multi-device store?
    const sameStore = state.stores.filter(x => x.storeName === s.storeName);
    const isMulti = sameStore.length > 1;
    let multiStatus = null;
    if (isMulti) {
      const anyOffline = sameStore.some(x => state.offlineDevices.find(o => o.deviceId === x.deviceId));
      if (anyOffline) multiStatus = "Ongoing Replacement";
    }
    return { ...s, deviceStatus: baseStatus, isMulti, multiStatus };
  });
}
function actionRequiredDevices() {
  // Offline for more than 3 days based on latestHeartbeat AND not already in offline/resolved/noHeartbeat/newRollout.
  // Devices with no heartbeat are excluded — they automatically appear on the No Heartbeat tab.
  const inOffline = new Set(state.offlineDevices.map(o => o.deviceId));
  const inResolved = new Set(state.resolvedCases.map(o => o.deviceId));
  const inNH = new Set(state.noHeartbeat.map(o => o.deviceId));
  const inNR = new Set(state.newRollout.map(o => o.deviceId));
  return state.stores.filter(s => {
    if (hasNoHeartbeat(s.latestHeartbeat)) return false;
    if (inOffline.has(s.deviceId) || inResolved.has(s.deviceId) || inNH.has(s.deviceId) || inNR.has(s.deviceId)) return false;
    const d = daysBetween(s.latestHeartbeat);
    return d !== null && d > 3;
  }).map(s => ({ ...s, daysOffline: daysBetween(s.latestHeartbeat) }));
}
function noHeartbeatAuto() {
  // All devices in All Stores whose latestHeartbeat is missing, a placeholder string,
  // or otherwise unparseable. This matches the "No Heartbeat" status definition exactly.
  return state.stores.filter(s => hasNoHeartbeat(s.latestHeartbeat)).map(s => ({
    deviceId: s.deviceId, storeName: s.storeName, source: "no_heartbeat", lastRatingCollected: null
  }));
}
function combinedNoHeartbeat() {
  // Manual additions + auto-derived (no_heartbeat) + collecting_feedback (manual moves from Action Required).
  // Devices currently in Offline Devices are hidden from this list — they reappear automatically
  // once moved out of Offline Devices (e.g. to Resolved Cases).
  const inOffline = new Set(state.offlineDevices.map(o => o.deviceId));
  const auto = noHeartbeatAuto();
  const manual = state.noHeartbeat;
  // Avoid duplicates: manual takes precedence
  const manualIds = new Set(manual.map(x => x.deviceId));
  return [
    ...manual.filter(x => !inOffline.has(x.deviceId)),
    ...auto.filter(x => !manualIds.has(x.deviceId) && !inOffline.has(x.deviceId))
  ];
}
function monitoringDevices() {
  // Devices in All Stores with Monitoring status (offline 1-3 days) + multi-device "Ongoing Replacement"
  const inOffline = new Set(state.offlineDevices.map(o => o.deviceId));
  const inResolved = new Set(state.resolvedCases.map(o => o.deviceId));
  const inNH = new Set(state.noHeartbeat.map(o => o.deviceId));
  const inNR = new Set(state.newRollout.map(o => o.deviceId));
  const out = [];
  for (const s of state.stores) {
    if (hasNoHeartbeat(s.latestHeartbeat)) continue;
    if (inOffline.has(s.deviceId) || inResolved.has(s.deviceId) || inNH.has(s.deviceId) || inNR.has(s.deviceId)) continue;
    const status = deviceStatusFromHeartbeat(s.latestHeartbeat);
    if (status === "Monitoring") {
      out.push({ storeName: s.storeName, deviceId: s.deviceId, currentStatus: "Devices that are Offline for less than 2 days" });
    }
  }
  // Multi-device stores: if there's an Offline Device for the same store, add "Ongoing Replacement" entries
  const offlineStoreNames = new Set(state.offlineDevices.map(o => o.storeName));
  for (const s of state.stores) {
    const sameStoreOnline = state.stores.filter(x => x.storeName === s.storeName).length > 1;
    if (sameStoreOnline && offlineStoreNames.has(s.storeName) && !out.find(o => o.deviceId === s.deviceId)) {
      const status = deviceStatusFromHeartbeat(s.latestHeartbeat);
      if (status === "Online" || status === "Monitoring") {
        out.push({ storeName: s.storeName, deviceId: s.deviceId, currentStatus: "Ongoing Replacement" });
      }
    }
  }
  return out;
}
function categorize(daysOffline) {
  if (daysOffline > 20) return "Backlog";
  return "Ongoing ticket";
}
function offlineDeviceWithDerived(o) {
  const days = daysBetween(o.lastOnline) ?? 0;
  const category = categorize(days);
  // Compute device status display
  let displayStatus = "Offline";
  const inStore = state.stores.find(s => s.deviceId === o.deviceId);
  if (o.deviceStatusOverride === "not_in_update") displayStatus = "Device not Available from Latest Update";
  else if (o.deviceStatusOverride === "now_online") displayStatus = "Action Required: Device is now Online";
  else if (o.deviceStatusOverride === "recently_online") displayStatus = "Action Required: Device is recently Online";
  else if (days > 14 && (!o.comment || !o.comment.trim())) displayStatus = "Action Required: Add comment: Offline for more than 14 days";
  return { ...o, daysOffline: days, category, displayStatus };
}

    <aside class="w-64 panel p-5 flex flex-col gap-1 min-h-screen" style="border-right:1px solid var(--border); border-top:none; border-bottom:none; border-left:none;">
      <div class="flex items-center gap-3 mb-8 px-2">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--accent); color: #001018;">
          ${I.activity}
        </div>
        <div>
          <div class="font-semibold text-sm">Device Monitor</div>
          <div class="text-xs text-mute">Operations Hub</div>
        </div>
      </div>
      ${items.map(it => `
        <div class="nav-item ${state.activeMain === it.id ? 'active' : ''}" data-nav="${it.id}">
          ${it.icon}
          <span>${it.label}</span>
        </div>
      `).join("")}
      <div class="mt-auto pt-6 px-2 border-t border-c" style="margin-top:auto;">
        ${_auth.email ? `
          <div class="flex items-center gap-2 px-2 py-2 panel-2 rounded-lg mb-2" style="font-size:12px;">
            ${_auth.picture ? `<img src="${_auth.picture}" style="width:28px; height:28px; border-radius:50%;" alt=""/>` : `<div style="width:28px; height:28px; border-radius:50%; background:var(--accent); color:#001018; display:flex; align-items:center; justify-content:center; font-weight:600;">${(_auth.name || _auth.email || "?")[0].toUpperCase()}</div>`}
            <div style="overflow:hidden; flex:1;">
              <div style="font-weight:500; color:var(--text); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${_auth.name || _auth.email}</div>
              <div style="font-size:11px; color:var(--text-mute); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${_auth.email}</div>

}

function mainContent() {
  return staleDataBanner() + (function() {
    switch (state.activeMain) {
      case "dashboard": return dashboardView();
      case "stores": return storesView();
      case "offline": return offlineView();
      case "returns": return returnsToRateItView();
      case "closed": return closedSitesView();
      case "stolen": return stolenDamagedLostView();
      case "profile": return profileView();
    }
    return "";
  })();
}

// ============= STALE DATA WARNING =============
// Show a non-dismissible banner at the top of every view when the Weekly Update
// hasn't been uploaded in more than 24 hours. Prompts the user to refresh data.
function staleDataBanner() {
  if (!state.lastUpload) {
    return `
      <div class="rounded-lg p-3 mb-4 flex items-start gap-3" style="background:rgba(249,115,22,0.12); border:1px solid rgba(249,115,22,0.4); color:var(--text);">
        <div style="color:#fb923c; flex-shrink:0; margin-top:1px;">${I.alert}</div>
        <div class="flex-1">
          <div class="font-semibold" style="color:#fb923c;">No Store List uploaded yet</div>
          <div class="text-xs text-dim mt-1">Data has not been imported. Go to Dashboard and use <strong>Upload Weekly Update</strong> to import the latest store list.</div>
        </div>
      </div>
    `;
  }
  const hoursSince = (Date.now() - new Date(state.lastUpload).getTime()) / 3600000;
  if (hoursSince > 24) {
    const daysSince = Math.floor(hoursSince / 24);
    const hrsRem = Math.floor(hoursSince % 24);
    const ageStr = daysSince > 0 ? `${daysSince}d ${hrsRem}h ago` : `${Math.floor(hoursSince)}h ago`;
    return `
      <div class="rounded-lg p-3 mb-4 flex items-start gap-3" style="background:rgba(249,115,22,0.12); border:1px solid rgba(249,115,22,0.4); color:var(--text);">
        <div style="color:#fb923c; flex-shrink:0; margin-top:1px;">${I.alert}</div>
        <div class="flex-1">
          <div class="font-semibold" style="color:#fb923c;">Store List may be out of date</div>
          <div class="text-xs text-dim mt-1">
            Last uploaded <strong>${ageStr}</strong> (${fmtDateShort(state.lastUpload)}). Data might not reflect current heartbeats — please upload the latest Weekly Update.
          </div>
        </div>
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:12px; flex-shrink:0;" data-go="dashboard">Go to Dashboard</button>
      </div>
    `;
  }
  return "";
}

// ============= DASHBOARD =============
function dashboardView() {
  const stores = storesWithStatus();
  const uniqueStores = new Set(stores.map(s => s.storeName));
  const storeMultiCount = [...uniqueStores].filter(n => stores.filter(s => s.storeName === n).length > 1).length;
  const onlineCount = stores.filter(s => s.deviceStatus === "Online").length;
  const monitoringCount = stores.filter(s => s.deviceStatus === "Monitoring").length;
  const offlineDerived = state.offlineDevices.map(offlineDeviceWithDerived);
  const backlog = offlineDerived.filter(o => o.category === "Backlog");
  const ongoing = offlineDerived.filter(o => o.category === "Ongoing ticket");
  const totalActiveTickets = offlineDerived.length;
  const noActionReq = combinedNoHeartbeat().length;

  // Status breakdowns for Action Required
  const groupByStatus = (arr) => {
    const m = {};
    arr.forEach(o => { m[o.currentStatus || "Unspecified"] = (m[o.currentStatus || "Unspecified"] || 0) + 1; });
    return m;
  };
  const groupByIssue = (arr) => {
    const m = {};
    arr.forEach(o => { m[o.issueCaseNote || "Unspecified"] = (m[o.issueCaseNote || "Unspecified"] || 0) + 1; });
    return m;
  };
  const backlogByStatus = groupByStatus(backlog);
  const ongoingByStatus = groupByStatus(ongoing);
  const backlogByIssue = groupByIssue(backlog);
  const ongoingByIssue = groupByIssue(ongoing);

  // Activity summary: items added/updated in last 7 days
  const recentlyAdded = state.offlineDevices.filter(o => o.movedToOfflineAt && daysBetween(o.movedToOfflineAt) <= 7).length;
  const recentlyResolved = state.resolvedCases.filter(o => o.resolvedAt && daysBetween(o.resolvedAt) <= 7).length;
  const recentlyAddedDaily = state.offlineDevices.filter(o => o.movedToOfflineAt && daysBetween(o.movedToOfflineAt) <= 1).length;
  const recentlyResolvedDaily = state.resolvedCases.filter(o => o.resolvedAt && daysBetween(o.resolvedAt) <= 1).length;

  // Build small bar chart for ongoing & backlog (last 7 days)
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const next = new Date(d); next.setDate(next.getDate()+1);
    days.push({
      label: d.toLocaleDateString("en-US",{weekday:"short"}),
      ongoing: state.offlineDevices.filter(o => { if(!o.movedToOfflineAt) return false; const t=new Date(o.movedToOfflineAt); const dr=daysBetween(o.lastOnline)??0; return t>=d && t<next && dr<=20; }).length,
      backlog: state.offlineDevices.filter(o => { if(!o.movedToOfflineAt) return false; const t=new Date(o.movedToOfflineAt); const dr=daysBetween(o.lastOnline)??0; return t>=d && t<next && dr>20; }).length,
    });
  }
  const maxBar = Math.max(1, ...days.map(d=>Math.max(d.ongoing,d.backlog)));

  return `
    <div class="flex items-start justify-between mb-1">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight">Dashboard</h1>
        <p class="text-dim text-sm mt-1">Overview of device fleet health and active tickets</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" data-action="export-pdf">${I.download} Export PDF</button>
        <button class="btn btn-primary" data-action="export-xlsx">${I.download} Export XLSX</button>
      </div>
    </div>

    <h2 class="text-lg font-semibold mt-8 mb-3">Store Overview</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="stat-card">
        <div class="stat-label">Total Active Stores</div>
        <div class="stat-num mt-2">${uniqueStores.size}</div>
        <div class="text-xs text-mute mt-1">Unique stores tracked</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Devices</div>
        <div class="stat-num mt-2">${state.stores.length}</div>
        <div class="text-xs text-mute mt-1">${storeMultiCount} store${storeMultiCount===1?'':'s'} with multiple devices</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Online Devices</div>
        <div class="stat-num mt-2" style="color:#4ade80">${onlineCount}</div>
        <div class="text-xs text-mute mt-1">Active within last 24h</div>
      </div>
    </div>

    <h2 class="text-lg font-semibold mt-8 mb-3">Action Required</h2>
    <div class="stat-card">
      <div class="flex items-end gap-8 mb-5">
        <div>
          <div class="stat-label">Total Offline Devices</div>
          <div style="font-size:48px; font-weight:700; line-height:1;" class="mt-2">${totalActiveTickets}</div>
        </div>
        <div class="flex gap-6 pb-2">
          <div>
            <span class="badge badge-backlog">Backlog: ${backlog.length}</span>
          </div>
          <div>
            <span class="badge badge-ongoing">Ongoing Ticket: ${ongoing.length}</span>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div class="panel-2 rounded-lg p-4">
          <div class="text-sm font-semibold mb-3" style="color:#c084fc">Backlog Breakdown (by Status)</div>
          ${Object.keys(backlogByStatus).length === 0 ? '<div class="text-xs text-mute">No backlog items</div>' :
            Object.entries(backlogByStatus).map(([k,v]) => `<div class="flex justify-between text-sm py-1.5 border-b border-c"><span class="text-dim">${k}</span><span class="font-semibold">${v}</span></div>`).join("")}
        </div>
        <div class="panel-2 rounded-lg p-4">
          <div class="text-sm font-semibold mb-3" style="color:#60a5fa">Ongoing Ticket Breakdown (by Status)</div>
          ${Object.keys(ongoingByStatus).length === 0 ? '<div class="text-xs text-mute">No ongoing items</div>' :
            Object.entries(ongoingByStatus).map(([k,v]) => `<div class="flex justify-between text-sm py-1.5 border-b border-c"><span class="text-dim">${k}</span><span class="font-semibold">${v}</span></div>`).join("")}
        </div>
      </div>

      <details class="mt-4">
        <summary class="text-sm font-medium accent-text flex items-center gap-1 cursor-pointer">${I.chevron}<span>Summary of Cases (by Issue / Case Note)</span></summary>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
          <div class="panel-2 rounded-lg p-4">
            <div class="text-sm font-semibold mb-2" style="color:#c084fc">Backlog — Issue / Case Note</div>
            ${Object.keys(backlogByIssue).length === 0 ? '<div class="text-xs text-mute">—</div>' :
              Object.entries(backlogByIssue).map(([k,v]) => `<div class="flex justify-between text-xs py-1 border-b border-c"><span class="text-dim">${k}</span><span class="font-semibold">${v}</span></div>`).join("")}
          </div>
          <div class="panel-2 rounded-lg p-4">
            <div class="text-sm font-semibold mb-2" style="color:#60a5fa">Ongoing — Issue / Case Note</div>
            ${Object.keys(ongoingByIssue).length === 0 ? '<div class="text-xs text-mute">—</div>' :
              Object.entries(ongoingByIssue).map(([k,v]) => `<div class="flex justify-between text-xs py-1 border-b border-c"><span class="text-dim">${k}</span><span class="font-semibold">${v}</span></div>`).join("")}
          </div>
        </div>
      </details>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
      <div class="stat-card">
        <h3 class="text-lg font-semibold mb-2">Activity Summary</h3>
        <div class="grid grid-cols-2 gap-4 mt-3">
          <div>
            <div class="stat-label">Today</div>
            <div class="mt-2 text-sm"><span style="color:#fb923c; font-weight:600;">+${recentlyAddedDaily}</span> moved to Offline</div>
            <div class="mt-1 text-sm"><span style="color:#4ade80; font-weight:600;">${recentlyResolvedDaily}</span> resolved</div>
          </div>
          <div>
            <div class="stat-label">Last 7 days</div>
            <div class="mt-2 text-sm"><span style="color:#fb923c; font-weight:600;">+${recentlyAdded}</span> moved to Offline</div>
            <div class="mt-1 text-sm"><span style="color:#4ade80; font-weight:600;">${recentlyResolved}</span> resolved</div>
          </div>
        </div>
        <div class="mt-5">
          <div class="stat-label mb-3">Weekly Trend (Offline tickets moved)</div>
          <div class="flex items-end gap-2 h-32">
            ${days.map(d => `
              <div class="flex-1 flex flex-col items-center gap-1">
                <div class="w-full flex flex-col-reverse gap-0.5" style="height: 100px">
                  <div style="height: ${(d.ongoing/maxBar)*100}%; background: #60a5fa; border-radius: 2px;" title="Ongoing: ${d.ongoing}"></div>
                  <div style="height: ${(d.backlog/maxBar)*100}%; background: #c084fc; border-radius: 2px;" title="Backlog: ${d.backlog}"></div>
                </div>
                <span class="text-xs text-mute">${d.label}</span>
              </div>
            `).join("")}
          </div>
          <div class="flex gap-4 mt-2 text-xs text-mute">
            <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#60a5fa"></span> Ongoing</span>
            <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#c084fc"></span> Backlog</span>
          </div>
        </div>
      </div>

      <div class="stat-card">
        <h3 class="text-lg font-semibold mb-2">Other Offline Devices</h3>
        <div class="space-y-3 mt-3">
          <div class="flex justify-between p-3 panel-2 rounded-lg">
            <div>
              <div class="text-sm font-semibold">Monitoring</div>
              <div class="text-xs text-mute mt-0.5">Devices offline 1–3 days + Ongoing Replacement</div>
            </div>
            <div class="text-2xl font-bold" style="color:#fb923c">${monitoringDevices().length}</div>
          </div>
          <div class="flex justify-between p-3 panel-2 rounded-lg">
            <div>
              <div class="text-sm font-semibold">No Action Required</div>
              <div class="text-xs text-mute mt-0.5">No Heartbeat / Showing Offline but collecting feedback</div>
            </div>
            <div class="text-2xl font-bold text-dim">${noActionReq}</div>
          </div>
          <div class="flex justify-between p-3 panel-2 rounded-lg">
            <div>
              <div class="text-sm font-semibold">New Rollout</div>
              <div class="text-xs text-mute mt-0.5">Recently opened stores</div>
            </div>
            <div class="text-2xl font-bold accent-text">${state.newRollout.length}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ============= STORES & DEVICES =============
function storesView() {
  const sub = state.activeSub.stores || "all";
  const tabs = [
    { id: "all", label: "All Stores", count: state.stores.length },
    { id: "action", label: "Action Required", count: actionRequiredDevices().length },
    { id: "nh", label: "No Heartbeat / Showing Offline", count: combinedNoHeartbeat().length },
    { id: "rollout", label: "New Rollout", count: state.newRollout.length },
  ];
  return `
    <div class="flex items-start justify-between mb-1">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight">Stores & Devices</h1>
        <p class="text-dim text-sm mt-1">Manage all store devices and their operational status</p>
      </div>
    </div>
    <div class="flex gap-6 border-b border-c mt-6 mb-6">
      ${tabs.map(t => `
        <div class="tab-btn ${sub===t.id?'active':''}" data-sub="${t.id}">
          ${t.label} <span class="ml-1 text-xs px-2 py-0.5 rounded-full panel-2">${t.count}</span>
        </div>
      `).join("")}
    </div>
    ${sub === "all" ? allStoresTab() : ""}
    ${sub === "action" ? actionRequiredTab() : ""}
    ${sub === "nh" ? noHeartbeatTab() : ""}
    ${sub === "rollout" ? newRolloutTab() : ""}
  `;
}

function allStoresTab() {
  const stores = storesWithStatus();
  let filtered = stores;
  if (state.filters.storesSearch) {
    const q = state.filters.storesSearch.toLowerCase();
    filtered = filtered.filter(s => (s.storeName||"").toLowerCase().includes(q) || (s.deviceId||"").toLowerCase().includes(q));
  }
  if (state.filters.storesStatus !== "all") {
    filtered = filtered.filter(s => s.deviceStatus === state.filters.storesStatus);
  }
  if (state.filters.storesMulti) {
    const multiNames = new Set();
    stores.forEach(s => { if (stores.filter(x => x.storeName === s.storeName).length > 1) multiNames.add(s.storeName); });
    filtered = filtered.filter(s => multiNames.has(s.storeName));
  }
  filtered.sort((a,b) => state.filters.storesSort==="asc" ? String(a.storeName||"").localeCompare(String(b.storeName||"")) : String(b.storeName||"").localeCompare(String(a.storeName||"")));

  return `
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <input class="input" style="width:240px" placeholder="Search store or device..." data-filter="storesSearch" value="${state.filters.storesSearch}"/>
      <select class="input" style="width:160px" data-filter="storesStatus">
        <option value="all" ${state.filters.storesStatus==="all"?"selected":""}>All Statuses</option>
        <option value="Online" ${state.filters.storesStatus==="Online"?"selected":""}>Online</option>
        <option value="Monitoring" ${state.filters.storesStatus==="Monitoring"?"selected":""}>Monitoring</option>
        <option value="Offline" ${state.filters.storesStatus==="Offline"?"selected":""}>Offline</option>
        <option value="No Heartbeat" ${state.filters.storesStatus==="No Heartbeat"?"selected":""}>No Heartbeat</option>
      </select>
      <button class="btn btn-ghost ${state.filters.storesMulti?'accent-text':''}" data-toggle="storesMulti">${I.filter} Multi-Device Stores</button>
      <button class="btn btn-ghost" data-toggle="storesSort">${I.sort} ${state.filters.storesSort==="asc"?"A→Z":"Z→A"}</button>
      <div class="ml-auto flex gap-2">
        <button class="btn btn-ghost" data-action="refresh-from-sheet" title="Pull the latest data from the Google Sheet (in case a teammate made changes)">${I.refresh} Refresh</button>
        <button class="btn btn-ghost" data-action="export-stores">${I.download} Export</button>
        <button class="btn btn-ghost" data-action="upload-storelist">${I.upload} Update Store List</button>
        <button class="btn btn-primary" data-action="add-store">${I.plus} Add Store</button>
      </div>
    </div>
    <div class="panel rounded-xl overflow-hidden">
      <div class="overflow-x-auto scroll-soft">
        <table>
          <thead>
            <tr>
              <th>Store Name</th>
              <th>Suffix</th>
              <th>Device ID</th>
              <th>Latest Heartbeat</th>
              <th>Date Last Updated</th>
              <th>Device Status</th>
              <th>Field Manager</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `<tr><td colspan="8" class="text-center text-mute py-12">No stores. Click <span class="accent-text">Add Store</span> or <span class="accent-text">Update Store List</span> to get started.</td></tr>` :
              filtered.map(s => {
                const hbDisplay = s.latestHeartbeat === "New Device Added" ? `<span style="color:#22d3ee">New Device Added</span>` :
                                  s.latestHeartbeat === "Device not Available from Latest Update" ? `<span style="color:#94a3b8">Device not Available from Latest Update</span>` :
                                  fmtDate(s.latestHeartbeat);
                return `
                <tr>
                  <td class="font-medium">${s.storeName}${s.isMulti?'<span class="ml-2 text-xs px-1.5 py-0.5 rounded" style="background:rgba(168,85,247,0.15);color:#c084fc">multi</span>':''}</td>

                  <td class="text-dim">${s.deviceId}</td>

                </tr>`;
              }).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

              <th>Store Name</th>
              <th>Device ID</th>
              <th>Latest Heartbeat</th>

              <th>Device Status</th>
              <th>Field Manager</th>
              <th>Actions</th>

            ${items.length === 0 ? `<tr><td colspan="7" class="text-center text-mute py-12">No devices requiring action. Devices that have been offline for more than 3 days will appear here.</td></tr>` :

                <tr>
                  <td class="font-medium">${s.storeName}</td>
                  <td class="text-dim">${s.deviceId}</td>
                  <td>${fmtDate(s.latestHeartbeat)}</td>

                  <td><span class="badge badge-offline">Offline</span></td>
                  <td class="text-dim">${s.fieldManager || "—"}</td>

// Helper: count days from Dispatch Date → Replacement Postage Date
function computeDaysFulfilled(dispatch, postage) {
  if (!dispatch || !postage) return null;
  const d1 = new Date(dispatch);
  const d2 = new Date(postage);
  if (isNaN(d1) || isNaN(d2)) return null;
  const diff = Math.floor((d2.getTime() - d1.getTime()) / 86400000);
  return diff >= 0 ? diff : null;
}
function fmtDateInput(s) {
  if (!s) return "";
  const d = new Date(s);
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}
// Parse legacy free-text closure dates like "Store Closure on 13 Apr 2026" or
// "Permanent Store Closure 28 Jun, 2024" into an ISO date string.
// Returns null if no date can be confidently extracted.
function parseClosureDateText(txt) {
  if (!txt) return null;
  const MONTHS = { jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
                   january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11 };
  // Match patterns like "13 Apr 2026", "28 Jun, 2024", "01 July 2025"
  const m = txt.match(/(\d{1,2})\s+([A-Za-z]+),?\s+(\d{2,4})/);
  if (!m) return null;
  const day = parseInt(m[1], 10);
  const mon = MONTHS[m[2].toLowerCase()];
  let year = parseInt(m[3], 10);
  if (mon === undefined || isNaN(day)) return null;
  // Handle 2-digit years and the "026" typo (treat as 2026)
  if (year < 100) year = 2000 + year;
  else if (year >= 100 && year < 1000) year = 2000 + (year % 100);
  const d = new Date(Date.UTC(year, mon, day));
  if (isNaN(d)) return null;
  return d.toISOString();
}

function returnsActiveTab() {

  if (state.filters.returnsSearch) {
    const q = state.filters.returnsSearch.toLowerCase();
    items = items.filter(r =>
      (r.store||"").toLowerCase().includes(q) ||
      (r.deviceIdReplacement||"").toLowerCase().includes(q) ||
      (r.deviceIdFaulty||"").toLowerCase().includes(q)
    );
  }
  if (state.filters.returnsCoho !== "all") {
    items = items.filter(r => (r.cohoStore || "") === state.filters.returnsCoho);
  }
  if (state.filters.returnsIssue !== "all") {
    items = items.filter(r => (r.issue || "") === state.filters.returnsIssue);
  }
  if (state.filters.returnsDeviceStatus !== "all") {
    items = items.filter(r => (r.deviceStatus || "") === state.filters.returnsDeviceStatus);
  }
  items.sort((a,b) => state.filters.returnsSort==="asc"
    ? String(a.store||"").localeCompare(String(b.store||""))
    : String(b.store||"").localeCompare(String(a.store||"")));

  return `
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <input class="input" style="width:240px" placeholder="Search store or device..." data-filter="returnsSearch" value="${state.filters.returnsSearch}"/>
      <select class="input" style="width:160px" data-filter="returnsCoho">
        <option value="all" ${state.filters.returnsCoho==="all"?"selected":""}>All COHO</option>
        <option value="Yes" ${state.filters.returnsCoho==="Yes"?"selected":""}>COHO: Yes</option>
        <option value="No" ${state.filters.returnsCoho==="No"?"selected":""}>COHO: No</option>
      </select>
      <select class="input" style="width:200px" data-filter="returnsIssue">
        <option value="all">All Issues</option>
        ${RETURNS_ISSUES.map(n => `<option value="${n}" ${state.filters.returnsIssue===n?"selected":""}>${n}</option>`).join("")}
      </select>
      <select class="input" style="width:220px" data-filter="returnsDeviceStatus">
        <option value="all">All Device Statuses</option>
        ${RETURNS_DEVICE_STATUSES.map(n => `<option value="${n}" ${state.filters.returnsDeviceStatus===n?"selected":""}>${n}</option>`).join("")}
      </select>
      <button class="btn btn-ghost" data-toggle="returnsSort">${I.sort} ${state.filters.returnsSort==="asc"?"A→Z":"Z→A"}</button>
    </div>
    <div class="panel rounded-xl overflow-hidden">
      <div class="overflow-x-auto scroll-soft">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th>Store</th>
              <th>COHO</th>
              <th>Device ID (Replacement)</th>
              <th>Device ID (Faulty)</th>
              <th>Issue</th>
              <th>Days Fulfilled</th>
              <th>Device Status</th>
              <th>Field Manager</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${items.length === 0 ? `<tr><td colspan="10" class="text-center text-mute py-12">No returns. Click <span class="accent-text">Add Return</span> to add one.</td></tr>` :
              items.map(r => returnRow(r, false)).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function returnRow(r, isResolved) {
  const expanded = state.expandedRow === ("ret-" + r.id);
  const days = computeDaysFulfilled(r.dispatchDate, r.replacementPostageDate);
  const daysDisplay = days !== null ? `<span class="font-semibold">${days}d</span>` : `<span class="text-mute">—</span>`;
  const devStatusDisplay = (() => {
    if (!r.deviceStatus) return `<span class="text-mute">—</span>`;
    if (r.deviceStatus === "Online and Collecting Feedback") return `<span class="badge badge-online">Online & Collecting</span>`;
    if (r.deviceStatus === "Offline") return `<span class="badge badge-offline">Offline</span>`;
    if (r.deviceStatus === "Others") return `<span class="badge badge-action">Other: ${r.deviceStatusOther || "—"}</span>`;
    return `<span class="text-dim text-xs">${r.deviceStatus}</span>`;
  })();
  const cohoDisplay = r.cohoStore === "Yes"
    ? `<span class="badge-coho">COHO</span>`
    : r.cohoStore === "No" ? `<span class="text-mute text-xs">No</span>` : `<span class="text-mute text-xs">—</span>`;
  return `
    <tr>
      <td><button data-action="toggle-expand-return" data-id="${r.id}" class="text-mute hover:accent-text">${I.chevron}</button></td>
      <td class="font-medium">${r.store || "—"}</td>
      <td>${cohoDisplay}</td>
      <td class="text-dim">${r.deviceIdReplacement || "—"}</td>
      <td class="text-dim">${r.deviceIdFaulty || "—"}</td>
      <td class="text-dim text-sm wrap" style="max-width:200px;">${r.issue || "—"}</td>
      <td>${daysDisplay}</td>
      <td class="wrap" style="max-width:200px;">${devStatusDisplay}</td>
      <td class="text-dim">${r.fieldManager || getStoreFieldManagerByStoreName(r.store) || "—"}</td>
      <td>
        ${isResolved ? `
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" data-action="unresolve-return" data-id="${r.id}">${I.refresh} Move back</button>
        ` : `
          <button class="btn btn-success" style="padding:4px 8px;font-size:11px" data-action="resolve-return" data-id="${r.id}">${I.check} Resolved</button>
        `}
        <button class="text-mute hover:text-red-400 ml-1" data-action="${isResolved?'delete-resolved-return':'delete-return'}" data-id="${r.id}" title="Delete">${I.trash}</button>
      </td>
    </tr>
    ${expanded ? `<tr class="expanded-row"><td colspan="10" style="padding:0;">${expandedReturnRow(r, isResolved)}</td></tr>` : ""}
  `;
}

// Helper: look up FM by store name (Returns rows store name only, not deviceId)
function getStoreFieldManagerByStoreName(storeName) {
  if (!storeName) return "";
  const s = state.stores.find(x => x.storeName === storeName);
  return s ? (s.fieldManager || "") : "";
}

function expandedReturnRow(r, isResolved) {
  const collection = isResolved ? "resolvedReturns" : "returnsToRateIt";
  const days = computeDaysFulfilled(r.dispatchDate, r.replacementPostageDate);
  const fmFromStore = getStoreFieldManagerByStoreName(r.store);
  return `
    <div class="p-6">
      ${isResolved ? `
        <div class="mb-4 p-3 rounded-lg flex items-center gap-3" style="background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.4)">
          ${I.check}
          <div>
            <div class="font-semibold" style="color:#4ade80">Status: Resolved</div>
            <div class="text-xs text-dim mt-0.5">Resolved on: ${r.resolvedAt ? fmtDateShort(r.resolvedAt) : "—"}</div>
          </div>
        </div>
      ` : ""}

      <div class="text-xs uppercase font-semibold text-mute mb-2" style="letter-spacing:0.05em;">1) RateIt → 7-Eleven</div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Store</label>

            <option value="" ${!r.cohoStore?"selected":""}>—</option>
            <option value="Yes" ${r.cohoStore==="Yes"?"selected":""}>Yes</option>
            <option value="No" ${r.cohoStore==="No"?"selected":""}>No</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Device ID (Replacement)</label>
          <input class="input mt-1" data-edit="deviceIdReplacement" data-id="${r.id}" data-collection="${collection}" data-toggle-alt-survey="1" value="${r.deviceIdReplacement || ''}"/>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Alternate Survey</label>
          <select class="input mt-1" data-edit="alternateSurvey" data-id="${r.id}" data-collection="${collection}">
            <option value="" ${!r.alternateSurvey || r.alternateSurvey === false || r.alternateSurvey === "" ? "selected":""}>—</option>
            <option value="Yes" ${r.alternateSurvey === "Yes" || r.alternateSurvey === true ? "selected":""}>Yes</option>
            <option value="No" ${r.alternateSurvey === "No" ? "selected":""}>No</option>
          </select>
        </div>
        <div class="md:col-span-2 flex items-end">
          ${(r.deviceIdReplacement && String(r.deviceIdReplacement).trim() && (!r.alternateSurvey || r.alternateSurvey === "" || r.alternateSurvey === false)) ? `
            <div class="rounded-lg p-2 flex items-center gap-2 w-full" style="background:rgba(34,211,238,0.1); border:1px solid rgba(34,211,238,0.35);">
              <div style="color:#22d3ee; flex-shrink:0;">${I.alert}</div>
              <div class="text-xs" style="color:#22d3ee;">Replacement device is now available, please update <strong>Alternate Survey</strong>.</div>
            </div>
          ` : ""}
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Issue</label>
          <select class="input mt-1" data-edit="issue" data-id="${r.id}" data-collection="${collection}">
            <option value="" ${!r.issue?"selected":""}>—</option>
            ${RETURNS_ISSUES.map(n => `<option value="${n}" ${r.issue===n?"selected":""}>${n}</option>`).join("")}
          </select>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Replacement Device Tracking Link</label>
          <input class="input mt-1" data-edit="replacementTrackingLink" data-id="${r.id}" data-collection="${collection}" value="${r.replacementTrackingLink || ''}" placeholder="https://..."/>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Dispatch Date</label>
          <input class="input mt-1" type="date" data-edit="dispatchDate" data-id="${r.id}" data-collection="${collection}" value="${fmtDateInput(r.dispatchDate)}"/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Replacement Postage Date</label>
          <input class="input mt-1" type="date" data-edit="replacementPostageDate" data-id="${r.id}" data-collection="${collection}" value="${fmtDateInput(r.replacementPostageDate)}"/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Delivered Date</label>
          <input class="input mt-1" type="date" data-edit="deliveredDate" data-id="${r.id}" data-collection="${collection}" value="${fmtDateInput(r.deliveredDate)}"/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Days Fulfilled <span class="text-mute" style="font-weight:400; text-transform:none;">(auto)</span></label>
          <input class="input mt-1" value="${days !== null ? days + ' day' + (days===1?'':'s') : ''}" readonly style="opacity:0.7; cursor:not-allowed;"/>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Device Status</label>
          <select class="input mt-1" data-edit="deviceStatus" data-id="${r.id}" data-collection="${collection}" data-toggle-other="1">
            <option value="" ${!r.deviceStatus?"selected":""}>—</option>
            ${RETURNS_DEVICE_STATUSES.map(n => `<option value="${n}" ${r.deviceStatus===n?"selected":""}>${n}</option>`).join("")}
          </select>
        </div>
        ${r.deviceStatus === "Others" ? `
          <div class="md:col-span-2">
            <label class="text-xs text-mute uppercase font-semibold">Reason (Other)</label>
            <input class="input mt-1" data-edit="deviceStatusOther" data-id="${r.id}" data-collection="${collection}" value="${r.deviceStatusOther || ''}" placeholder="Type reason..."/>
          </div>
        ` : `<div class="md:col-span-2"></div>`}
      </div>

      <div class="text-xs uppercase font-semibold text-mute mb-2 mt-5" style="letter-spacing:0.05em;">2) 7-Eleven → RateIt</div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Device ID (Faulty)</label>
          <input class="input mt-1" data-edit="deviceIdFaulty" data-id="${r.id}" data-collection="${collection}" value="${r.deviceIdFaulty || ''}"/>
        </div>
        <div class="md:col-span-2"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Faulty Device Tracking Link</label>
          <input class="input mt-1" data-edit="faultyTrackingLink" data-id="${r.id}" data-collection="${collection}" value="${r.faultyTrackingLink || ''}" placeholder="https://..."/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Faulty Device Postage Date</label>
          <input class="input mt-1" type="date" data-edit="faultyDevicePostageDate" data-id="${r.id}" data-collection="${collection}" value="${fmtDateInput(r.faultyDevicePostageDate || r.deviceReturnedToRateIt)}"/>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Device Received At Warehouse</label>
          <input class="input mt-1" type="date" data-edit="deviceReceivedAtWarehouse" data-id="${r.id}" data-collection="${collection}" value="${fmtDateInput(r.deviceReceivedAtWarehouse)}"/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">No. of days to receive</label>
          <input class="input mt-1" type="number" min="0" data-edit="daysToReceive" data-id="${r.id}" data-collection="${collection}" value="${r.daysToReceive || ''}"/>
        </div>
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Field Manager <span class="text-mute" style="font-weight:400; text-transform:none;">(from store list)</span></label>
          <input class="input mt-1" value="${fmFromStore || r.fieldManager || ''}" readonly style="opacity:0.7; cursor:not-allowed;"/>
        </div>
      </div>

      <div class="flex gap-2 mt-4">
        <button class="btn btn-primary" data-action="save-return" data-id="${r.id}" data-resolved="${isResolved?'1':''}">Save Changes</button>
        ${isResolved
          ? `<button class="btn btn-ghost" data-action="unresolve-return" data-id="${r.id}">${I.refresh} Move back to Returns</button>`
          : `<button class="btn btn-success" data-action="resolve-return" data-id="${r.id}">${I.check} Mark Resolved</button>`}
        <button class="btn btn-ghost" data-action="collapse-expand-return" data-id="${r.id}">Cancel</button>
      </div>
    </div>
  `;
}

function resolvedReturnsTab() {
  let items = state.resolvedReturns.slice();
  if (state.filters.returnsSearch) {
    const q = state.filters.returnsSearch.toLowerCase();
    items = items.filter(r =>
      (r.store||"").toLowerCase().includes(q) ||
      (r.deviceIdReplacement||"").toLowerCase().includes(q) ||
      (r.deviceIdFaulty||"").toLowerCase().includes(q)
    );
  }
  if (state.filters.returnsCoho !== "all") {
    items = items.filter(r => (r.cohoStore || "") === state.filters.returnsCoho);
  }
  items.sort((a,b) => (b.resolvedAt || "").localeCompare(a.resolvedAt || ""));

  return `
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <input class="input" style="width:240px" placeholder="Search store or device..." data-filter="returnsSearch" value="${state.filters.returnsSearch}"/>
      <select class="input" style="width:160px" data-filter="returnsCoho">
        <option value="all" ${state.filters.returnsCoho==="all"?"selected":""}>All COHO</option>
        <option value="Yes" ${state.filters.returnsCoho==="Yes"?"selected":""}>COHO: Yes</option>
        <option value="No" ${state.filters.returnsCoho==="No"?"selected":""}>COHO: No</option>
      </select>
    </div>
    <div class="panel rounded-xl overflow-hidden">
      <div class="overflow-x-auto scroll-soft">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th>Store</th>
              <th>COHO</th>
              <th>Device ID (Replacement)</th>
              <th>Device ID (Faulty)</th>
              <th>Issue</th>
              <th>Status</th>
              <th>Resolved At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${items.length === 0 ? `<tr><td colspan="9" class="text-center text-mute py-12">No resolved returns yet.</td></tr>` :
              items.map(r => {
                const expanded = state.expandedRow === ("ret-" + r.id);
                const cohoDisplay = r.cohoStore === "Yes"
                  ? `<span class="badge-coho">COHO</span>`
                  : r.cohoStore === "No" ? `<span class="text-mute text-xs">No</span>` : `<span class="text-mute text-xs">—</span>`;
                return `
                  <tr>
                    <td><button data-action="toggle-expand-return" data-id="${r.id}" class="text-mute hover:accent-text">${I.chevron}</button></td>
                    <td class="font-medium">${r.store || "—"}</td>
                    <td>${cohoDisplay}</td>
                    <td class="text-dim">${r.deviceIdReplacement || "—"}</td>
                    <td class="text-dim">${r.deviceIdFaulty || "—"}</td>
                    <td class="text-dim text-sm wrap" style="max-width:200px;">${r.issue || "—"}</td>
                    <td><span class="badge badge-resolved">Resolved</span></td>
                    <td class="text-dim text-sm">${r.resolvedAt ? fmtDateShort(r.resolvedAt) : "—"}</td>
                    <td>
                      <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" data-action="unresolve-return" data-id="${r.id}">${I.refresh} Move back</button>
                      <button class="text-mute hover:text-red-400 ml-1" data-action="delete-resolved-return" data-id="${r.id}" title="Delete">${I.trash}</button>
                    </td>
                  </tr>
                  ${expanded ? `<tr class="expanded-row"><td colspan="9" style="padding:0;">${expandedReturnRow(r, true)}</td></tr>` : ""}
                `;
              }).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ============= CLOSED SITES =============
function closedSitesView() {
  let items = state.closedSites.slice();
  if (state.filters.closedSearch) {
    const q = state.filters.closedSearch.toLowerCase();
    items = items.filter(c =>
      (c.storeName||"").toLowerCase().includes(q) ||
      (c.deviceId||"").toLowerCase().includes(q) ||
      (c.closureDates||"").toLowerCase().includes(q)
    );
  }
  if (state.filters.closedStatus !== "all") {
    items = items.filter(c => (c.deviceStatus || "") === state.filters.closedStatus);
  }
  items.sort((a,b) => state.filters.closedSort==="asc"
    ? String(a.storeName||"").localeCompare(String(b.storeName||""))
    : String(b.storeName||"").localeCompare(String(a.storeName||"")));

  return `
    <div class="flex items-start justify-between mb-1">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight">Closed Sites</h1>
        <p class="text-dim text-sm mt-1">Track sites that have been closed and the status of their devices</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" data-action="export-closed">${I.download} Export</button>
        <button class="btn btn-primary" data-action="add-closed-site">${I.plus} Add Closed Site</button>
      </div>
    </div>
    <div class="flex flex-wrap gap-3 mb-4 mt-6 items-center">
      <input class="input" style="width:240px" placeholder="Search store or device..." data-filter="closedSearch" value="${state.filters.closedSearch}"/>
      <select class="input" style="width:220px" data-filter="closedStatus">
        <option value="all" ${state.filters.closedStatus==="all"?"selected":""}>All Device Statuses</option>
        ${CLOSED_DEVICE_STATUSES.filter(s=>s).map(s => `<option value="${s}" ${state.filters.closedStatus===s?"selected":""}>${s}</option>`).join("")}
      </select>
      <button class="btn btn-ghost" data-toggle="closedSort">${I.sort} ${state.filters.closedSort==="asc"?"A→Z":"Z→A"}</button>
    </div>
    <div class="panel rounded-xl overflow-hidden">
      <div class="overflow-x-auto scroll-soft">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th>Store Name</th>
              <th>Device ID</th>
              <th>Device Status</th>
              <th>Closure Date</th>
              <th>Ticket No.</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${items.length === 0 ? `<tr><td colspan="7" class="text-center text-mute py-12">No closed sites. Click <span class="accent-text">Add Closed Site</span> to add one.</td></tr>` :
              items.map(c => closedSiteRow(c)).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function closedSiteRow(c) {
  const expanded = state.expandedRow === ("cls-" + c.id);
  const statusBadgeClass = c.deviceStatus === "Online" ? "badge-online"
    : c.deviceStatus === "Offline" ? "badge-offline"
    : c.deviceStatus === "Device removed from portal" ? "badge-closed"
    : "";
  return `
    <tr>
      <td><button data-action="toggle-expand-closed" data-id="${c.id}" class="text-mute hover:accent-text">${I.chevron}</button></td>
      <td class="font-medium">${c.storeName || "—"}</td>
      <td class="text-dim">${c.deviceId || "—"}</td>
      <td>${c.deviceStatus ? `<span class="badge ${statusBadgeClass}">${c.deviceStatus}</span>` : `<span class="text-mute">—</span>`}</td>
      <td class="text-dim text-sm">${c.closureDateIso ? fmtDateShort(c.closureDateIso) : (c.closureDates || "—")}</td>
      <td class="text-dim text-sm">${c.ticketNo || "—"}</td>
      <td>
        <button class="text-mute hover:text-red-400" data-action="delete-closed-site" data-id="${c.id}" title="Delete">${I.trash}</button>
      </td>
    </tr>
    ${expanded ? `<tr class="expanded-row"><td colspan="7" style="padding:0;">${expandedClosedRow(c)}</td></tr>` : ""}
  `;
}

  return `
    <div class="p-6">

          <label class="text-xs text-mute uppercase font-semibold">Store Name</label>

          <label class="text-xs text-mute uppercase font-semibold">Device ID</label>

        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        <div>
          <label class="text-xs text-mute uppercase font-semibold">Device Status</label>
          <select class="input mt-1" data-edit="deviceStatus" data-id="${c.id}" data-collection="closedSites">
            <option value="" ${!c.deviceStatus?"selected":""}>—</option>

// ============= STOLEN / DAMAGED / LOST =============
function stolenDamagedLostView() {
  let items = state.stolenDamagedLost.slice();
  if (state.filters.stolenSearch) {
    const q = state.filters.stolenSearch.toLowerCase();
    items = items.filter(s =>
      (s.storeName||"").toLowerCase().includes(q) ||
      (s.deviceId||"").toLowerCase().includes(q) ||
      (s.status||"").toLowerCase().includes(q)
    );
  }
  if (state.filters.stolenPortal !== "all") {
    items = items.filter(s => (s.portalStatus || "") === state.filters.stolenPortal);
  }
  items.sort((a,b) => state.filters.stolenSort==="asc"
    ? String(a.storeName||"").localeCompare(String(b.storeName||""))
    : String(b.storeName||"").localeCompare(String(a.storeName||"")));

  return `
    <div class="flex items-start justify-between mb-1">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight">Stolen / Damaged / Lost</h1>
        <p class="text-dim text-sm mt-1">Devices that cannot be returned to RateIt</p>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" data-action="export-stolen">${I.download} Export</button>
        <button class="btn btn-primary" data-action="add-stolen">${I.plus} Add Record</button>
      </div>
    </div>
    <div class="mt-4 mb-4 p-3 rounded-lg text-sm" style="background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); color:var(--text-dim);">
      ${I.alert} Devices in this list have been stolen or lost and cannot be returned to RateIt. These devices have been replaced by RateIt within the contracted 5% allowance of total no. of devices.
    </div>
    <div class="flex flex-wrap gap-3 mb-4 items-center">
      <input class="input" style="width:240px" placeholder="Search store, device, or status..." data-filter="stolenSearch" value="${state.filters.stolenSearch}"/>
      <select class="input" style="width:220px" data-filter="stolenPortal">
        <option value="all" ${state.filters.stolenPortal==="all"?"selected":""}>All Portal Statuses</option>
        ${PORTAL_STATUSES.filter(s=>s).map(s => `<option value="${s}" ${state.filters.stolenPortal===s?"selected":""}>${s}</option>`).join("")}
      </select>
      <button class="btn btn-ghost" data-toggle="stolenSort">${I.sort} ${state.filters.stolenSort==="asc"?"A→Z":"Z→A"}</button>
    </div>
    <div class="panel rounded-xl overflow-hidden">
      <div class="overflow-x-auto scroll-soft">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th>Store Name</th>
              <th>Device ID</th>
              <th>Status</th>
              <th>Portal Status</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${items.length === 0 ? `<tr><td colspan="7" class="text-center text-mute py-12">No records. Click <span class="accent-text">Add Record</span> to add one.</td></tr>` :
              items.map(s => stolenRow(s)).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function stolenRow(s) {
  const expanded = state.expandedRow === ("stl-" + s.id);
  const portalBadge = s.portalStatus === "Removed from the portal" ? "badge-closed"
    : s.portalStatus === "Not yet removed" ? "badge-monitoring"
    : "";
  // Notes preview: show first 60 chars; "Add note" hint if empty, with full text on hover
  const notesText = (s.notes || "").trim();
  const notesPreview = notesText
    ? `<span class="text-dim text-xs wrap" title="${notesText.replace(/"/g, '&quot;')}">${notesText.length > 60 ? notesText.substring(0, 60) + '…' : notesText}</span>`
    : `<button class="text-mute hover:accent-text text-xs" data-action="toggle-expand-stolen" data-id="${s.id}" style="font-style:italic;">+ Add note</button>`;
  return `
    <tr>
      <td><button data-action="toggle-expand-stolen" data-id="${s.id}" class="text-mute hover:accent-text">${I.chevron}</button></td>
      <td class="font-medium">${s.storeName || "—"}</td>
      <td class="text-dim">${s.deviceId || "—"}</td>
      <td><span class="badge badge-stolen">${s.status || "—"}</span></td>
      <td>${s.portalStatus ? `<span class="badge ${portalBadge}">${s.portalStatus}</span>` : `<span class="text-mute">—</span>`}</td>
      <td style="max-width:220px;">${notesPreview}</td>
      <td>
        <button class="text-mute hover:text-red-400" data-action="delete-stolen" data-id="${s.id}" title="Delete">${I.trash}</button>
      </td>
    </tr>
    ${expanded ? `<tr class="expanded-row"><td colspan="7" style="padding:0;">${expandedStolenRow(s)}</td></tr>` : ""}
  `;
}

function expandedStolenRow(s) {
  return `
    <div class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        <div>

function modalEl() {
  const m = state.modal;
  if (m.type === "confirm") return modalConfirm(m);
  if (m.type === "add-store") return modalAddStore();
  if (m.type === "move-to-offline") return modalMoveToOffline(m);
  if (m.type === "new-rollout") return modalNewRollout(m);
  if (m.type === "add-return") return modalAddReturn();
  if (m.type === "add-closed-site") return modalAddClosedSite();
  if (m.type === "add-stolen") return modalAddStolen();
  return "";
}
