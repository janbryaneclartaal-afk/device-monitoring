// ============= EVENT WIRING =============
function attachEvents() {
  document.querySelectorAll("[data-nav]").forEach(el => {
    el.onclick = () => { state.activeMain = el.dataset.nav; state.expandedRow = null; render(); };
  });
  document.querySelectorAll("[data-sub]").forEach(el => {
    el.onclick = () => { state.activeSub.stores = el.dataset.sub; state.expandedRow = null; render(); };
  });
  document.querySelectorAll("[data-sub-offline]").forEach(el => {
    el.onclick = () => { state.activeSub.offline = el.dataset.subOffline; state.expandedRow = null; render(); };
  });
  document.querySelectorAll("[data-sub-returns]").forEach(el => {
    el.onclick = () => { state.activeSub.returns = el.dataset.subReturns; state.expandedRow = null; render(); };
  });
  document.querySelectorAll("[data-go]").forEach(el => {
    el.onclick = () => { state.activeMain = el.dataset.go; state.expandedRow = null; render(); };
  });
  document.querySelectorAll("[data-sub-profile]").forEach(el => {
    el.onclick = async () => {
      state.activeSub.profile = el.dataset.subProfile;
      // Auto-load invites when entering Team tab
      if (el.dataset.subProfile === "team" && state.isAdmin && !state.invites) {
        render();
        try {
          const list = await api("listInvites");
          state.invites = list.invites || [];
          render();
        } catch (e) {
          showToast("Failed to load: " + e.message, "error");
        }
      } else {
        render();
      }
    };
  });
  document.querySelectorAll("[data-filter]").forEach(el => {
    const setVal = () => {
      const key = el.dataset.filter;
      let v = el.value;
      if (key === "arDaysMin") v = parseInt(v) || 0;
      state.filters[key] = v;
      render();
    };
    el.oninput = setVal;
    el.onchange = setVal;
  });
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.onclick = () => {
      const k = el.dataset.toggle;
      if (k === "storesMulti") state.filters.storesMulti = !state.filters.storesMulti;
      if (k === "storesSort") state.filters.storesSort = state.filters.storesSort === "asc" ? "desc" : "asc";
      if (k === "arSort") state.filters.arSort = state.filters.arSort === "asc" ? "desc" : "asc";
      if (k === "offlineSort") state.filters.offlineSort = state.filters.offlineSort === "asc" ? "desc" : "asc";
      if (k === "returnsSort") state.filters.returnsSort = state.filters.returnsSort === "asc" ? "desc" : "asc";
      if (k === "closedSort") state.filters.closedSort = state.filters.closedSort === "asc" ? "desc" : "asc";
      if (k === "stolenSort") state.filters.stolenSort = state.filters.stolenSort === "asc" ? "desc" : "asc";
      render();
    };
  });
  document.querySelectorAll("[data-action]").forEach(el => {
    el.onclick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      handleAction(el.dataset.action, el, e);
    };
  });
  document.querySelectorAll("[data-overlay]").forEach(el => {
    el.onclick = (e) => { if (e.target === el) closeModal(); };
  });
  document.querySelectorAll("[data-edit]").forEach(el => {
    el.onchange = () => {
      const id = el.dataset.id;
      const field = el.dataset.edit;
      const collection = el.dataset.collection || "offlineDevices";
      const arr = state[collection];
      if (!Array.isArray(arr)) return;
      // offlineDevices uses deviceId as the key; everything else uses id
      const idField = (collection === "offlineDevices") ? "deviceId" : "id";
      const o = arr.find(x => x[idField] === id);
      if (!o) return;
      if (el.type === "checkbox") {
        o[field] = !!el.checked;
      } else {
        o[field] = el.value;
      }
      // For Returns: re-render when Device Status changes so "Others" reason field appears/disappears
      if (el.dataset.toggleOther === "1") {
        render();
      }
      // For Returns: re-render when Device ID (Replacement) changes so the Alternate Survey reminder updates
      if (el.dataset.toggleAltSurvey === "1") {
        render();
      }
    };
  });
  document.querySelectorAll("[data-profile]").forEach(el => {
    el.onchange = () => {
      state.profile[el.dataset.profile] = el.value;
      if (el.dataset.profile === "theme") applyTheme();
    };
  });
}

async function handleAction(action, el, ev) {
  const id = el.dataset.id;
  switch (action) {
    case "close-toast": state.toast = null; render(); break;
    case "close-modal": closeModal(); break;
    case "confirm-yes":
      if (state.modal && state.modal.onConfirm) state.modal.onConfirm();
      closeModal();
      break;
    case "add-store": state.modal = { type: "add-store" }; render(); break;
    case "submit-add-store": submitAddStore(); break;
    case "delete-store":
      confirmDialog("Delete this store? This action cannot be undone.", async () => {
        state.stores = state.stores.filter(s => s.deviceId !== id);
        saveKey("stores");
        showToast("Store deleted.");
      });
      break;
    case "upload-storelist": uploadStoreList(); break;
    case "move-to-offline":
      state.modal = { type: "move-to-offline", deviceId: id, fromNh: el.dataset.fromNh === "1" };
      render();
      break;
    case "submit-move-to-offline": submitMoveToOffline(id, el.dataset.fromNh === "1"); break;
    case "new-rollout":
      state.modal = { type: "new-rollout", deviceId: id };
      render();
      break;
    case "submit-new-rollout": submitNewRollout(id); break;
    case "to-nh":
      confirmDialog("Move this device to 'Showing offline but collecting feedback'?", async () => {
        const s = state.stores.find(x => x.deviceId === id);
        if (s) {
          state.noHeartbeat.push({ deviceId: id, storeName: s.storeName, source: "collecting_feedback", lastRatingCollected: null });
          saveKey("noHeartbeat");
          showToast("Moved to Showing offline but collecting feedback.");
        }
      });
      break;
    case "toggle-expand":
      state.expandedRow = state.expandedRow === id ? null : id;
      render();
      break;
    case "collapse-expand":
      state.expandedRow = null; render(); break;
    case "save-offline":
      const o = state.offlineDevices.find(x => x.deviceId === id);
      if (o) {
        o.lastChangesMade = new Date().toISOString();
        // If comment added, clear "need comment" override (it's auto-derived)
        saveKey("offlineDevices");
        showToast("Saved.");
        state.expandedRow = null;
        render();
      }
      break;
    case "clear-online-flag":
      const target = state.offlineDevices.find(x => x.deviceId === id);
      if (target) {
        target.deviceStatusOverride = null;
        target.lastChangesMade = new Date().toISOString();
        saveKey("offlineDevices");
        showToast("Status updated. Add a comment to remove warnings.");
        render();
      }
      break;
    case "move-to-resolved":
      confirmDialog("Move this device to Resolved Cases? Latest Heartbeat will be updated to now.", async () => {
        const idx = state.offlineDevices.findIndex(x => x.deviceId === id);
        if (idx >= 0) {
          const o = state.offlineDevices[idx];
          state.resolvedCases.push({ ...o, resolvedAt: new Date().toISOString(), category: "Resolved" });
          state.offlineDevices.splice(idx, 1);
          // Update Latest Heartbeat in stores
          const s = state.stores.find(x => x.deviceId === id);
          if (s) s.latestHeartbeat = new Date().toISOString();
          saveAll();
          showToast("Moved to Resolved Cases.");
          state.expandedRow = null;
          render();
        }
      });
      break;
    case "move-back-to-offline":
      confirmDialog("Move back to Offline Devices? Latest Heartbeat will be updated to now.", async () => {
        const idx = state.resolvedCases.findIndex(x => x.deviceId === id);
        if (idx >= 0) {
          const o = state.resolvedCases[idx];
          delete o.resolvedAt;
          o.category = categorize(daysBetween(o.lastOnline) ?? 0);
          o.lastChangesMade = new Date().toISOString();
          state.offlineDevices.push(o);
          state.resolvedCases.splice(idx, 1);
          const s = state.stores.find(x => x.deviceId === id);
          if (s) s.latestHeartbeat = new Date().toISOString();
          saveAll();
          showToast("Moved back to Offline Devices.");
          render();
        }
      });
      break;
    case "rollout-back-online":
      confirmDialog("Mark this rollout device as online and remove from New Rollout?", async () => {
        state.newRollout = state.newRollout.filter(r => r.deviceId !== id);
        saveKey("newRollout");
        showToast("Removed from New Rollout.");
      });
      break;
    case "set-rollout-date":
      const r = state.newRollout.find(x => x.deviceId === id);
      if (r) {
        r.storeOpeningDate = el.value ? new Date(el.value).toISOString() : null;
        saveKey("newRollout");
        showToast("Updated opening date.", "success", 1500);
      }
      break;
    case "set-rating-date":
      const nh = state.noHeartbeat.find(x => x.deviceId === id);
      if (nh) {
        nh.lastRatingCollected = el.value ? new Date(el.value).toISOString() : null;
        saveKey("noHeartbeat");
        showToast("Updated.", "success", 1500);
      } else {
        // It's an auto-derived one — promote to manual entry
        const s = state.stores.find(x => x.deviceId === id);
        if (s) {
          state.noHeartbeat.push({ deviceId: id, storeName: s.storeName, source: "no_heartbeat", lastRatingCollected: el.value ? new Date(el.value).toISOString() : null });
          saveKey("noHeartbeat");
          showToast("Updated.", "success", 1500);
        }
      }
      break;
    case "save-profile":
      saveKey("profile");
      applyTheme();
      showToast("Profile saved.");
      render();
      break;
    case "export-stores": exportStores(); break;
    case "export-offline": exportOfflineMonitoring(); break;
    case "export-xlsx": exportFullXLSX(); break;
    case "export-pdf": exportDashboardPDF(); break;
    case "refresh-invites":
      try {
        showToast("Loading allowed users…", "success", 1500);
        const res = await api("listInvites");
        state.invites = res.invites || [];
        render();
      } catch (e) {
        showToast("Failed to load: " + e.message, "error");
      }
      break;
    case "send-invite":
      const emailInput = document.getElementById("invite-email");
      const sendEmailCheckbox = document.getElementById("invite-send-email");
      if (!emailInput) break;
      const newEmail = (emailInput.value || "").trim().toLowerCase();
      const sendEmail = sendEmailCheckbox && sendEmailCheckbox.checked;
      if (!newEmail || newEmail.indexOf("@") < 1) {
        showToast("Please enter a valid email address.", "error");
        break;
      }
      try {
        const result = await api("invite", { email: newEmail, sendEmail: sendEmail });
        if (result.emailError) {
          showToast("Invited, but email failed: " + result.emailError, "warn", 5000);
        } else if (result.emailSent) {
          showToast("Invited " + newEmail + " and sent a sign-in email.", "success");
        } else {
          showToast("Invited " + newEmail + ".", "success");
        }
        emailInput.value = "";
        // Refresh the list
        const list = await api("listInvites");
        state.invites = list.invites || [];
        render();
      } catch (e) {
        showToast(e.message, "error");
      }
      break;
    case "revoke-invite":
      const emailToRevoke = el.dataset.email;
      if (!emailToRevoke) break;
      confirmDialog("Revoke access for " + emailToRevoke + "? They won't be able to sign in anymore. You can re-invite them later.", async () => {
        try {
          await api("revoke", { email: emailToRevoke });
          showToast("Revoked " + emailToRevoke + ".");
          const list = await api("listInvites");
          state.invites = list.invites || [];
          render();
        } catch (e) {
          showToast("Revoke failed: " + e.message, "error");
        }
      });
      break;
    case "refresh-from-sheet":
      showToast("Refreshing from Google Sheet…", "success", 1500);
      await loadState();
      render();
      showToast("Refreshed.");
      break;

    // ===== RETURNS TO RATEIT actions =====
    case "toggle-expand-return":
      state.expandedRow = state.expandedRow === ("ret-" + id) ? null : ("ret-" + id);
      render();
      break;
    case "collapse-expand-return":
      state.expandedRow = null; render(); break;
    case "add-return":
      state.modal = { type: "add-return" }; render(); break;
    case "submit-add-return": submitAddReturn(); break;
    case "save-return": {
      const isResolved = el.dataset.resolved === "1";
      const arr = isResolved ? state.resolvedReturns : state.returnsToRateIt;
      const r = arr.find(x => x.id === id);
      if (r) {
        // Auto-compute days fulfilled and persist
        const days = computeDaysFulfilled(r.dispatchDate, r.replacementPostageDate);
        r.daysFulfilled = days;
        r.lastUpdated = new Date().toISOString();
        saveKey(isResolved ? "resolvedReturns" : "returnsToRateIt");
        showToast("Saved.");
        state.expandedRow = null;
        render();
      }
      break;
    }
    case "resolve-return": {
      confirmDialog("Mark this return as Resolved? It will move to the Resolved Returns tab.", async () => {
        const idx = state.returnsToRateIt.findIndex(x => x.id === id);
        if (idx >= 0) {
          const r = state.returnsToRateIt[idx];
          r.daysFulfilled = computeDaysFulfilled(r.dispatchDate, r.replacementPostageDate);
          r.status = "Resolved";
          r.resolvedAt = new Date().toISOString();
          r.lastUpdated = r.resolvedAt;
          state.resolvedReturns.push(r);
          state.returnsToRateIt.splice(idx, 1);
          saveKey("returnsToRateIt");
          saveKey("resolvedReturns");
          showToast("Moved to Resolved Returns.");
          state.expandedRow = null;
          render();
        }
      });
      break;
    }
    case "unresolve-return": {
      confirmDialog("Move this return back to active Returns to RateIt?", async () => {
        const idx = state.resolvedReturns.findIndex(x => x.id === id);
        if (idx >= 0) {
          const r = state.resolvedReturns[idx];
          delete r.status;
          delete r.resolvedAt;
          r.lastUpdated = new Date().toISOString();
          state.returnsToRateIt.push(r);
          state.resolvedReturns.splice(idx, 1);
          saveKey("returnsToRateIt");
          saveKey("resolvedReturns");
          showToast("Moved back to Returns to RateIt.");
          state.expandedRow = null;
          render();
        }
      });
      break;
    }
    case "delete-return":
      confirmDialog("Delete this return? This action cannot be undone.", async () => {
        state.returnsToRateIt = state.returnsToRateIt.filter(x => x.id !== id);
        saveKey("returnsToRateIt");
        showToast("Return deleted.");
        render();
      });
      break;
    case "delete-resolved-return":
      confirmDialog("Delete this resolved return? This action cannot be undone.", async () => {
        state.resolvedReturns = state.resolvedReturns.filter(x => x.id !== id);
        saveKey("resolvedReturns");
        showToast("Resolved return deleted.");
        render();
      });
      break;
    case "export-returns": exportReturns(); break;

    // ===== CLOSED SITES actions =====
    case "toggle-expand-closed":
      state.expandedRow = state.expandedRow === ("cls-" + id) ? null : ("cls-" + id);
      render();
      break;
    case "collapse-expand-closed":
      state.expandedRow = null; render(); break;
    case "add-closed-site":
      state.modal = { type: "add-closed-site" }; render(); break;
    case "submit-add-closed-site": submitAddClosedSite(); break;
    case "save-closed-site": {
      const c = state.closedSites.find(x => x.id === id);
      if (c) {
        c.lastUpdated = new Date().toISOString();
        saveKey("closedSites");
        showToast("Saved.");
        state.expandedRow = null;
        render();
      }
      break;
    }
    case "delete-closed-site":
      confirmDialog("Delete this closed site record? This action cannot be undone.", async () => {
        state.closedSites = state.closedSites.filter(x => x.id !== id);
        saveKey("closedSites");
        showToast("Record deleted.");
        render();
      });
      break;
    case "export-closed": exportClosed(); break;

    // ===== STOLEN / DAMAGED / LOST actions =====
    case "toggle-expand-stolen":
      state.expandedRow = state.expandedRow === ("stl-" + id) ? null : ("stl-" + id);
      render();
      break;
    case "collapse-expand-stolen":
      state.expandedRow = null; render(); break;
    case "add-stolen":
      state.modal = { type: "add-stolen" }; render(); break;
    case "submit-add-stolen": submitAddStolen(); break;
    case "save-stolen": {
      const s = state.stolenDamagedLost.find(x => x.id === id);
      if (s) {
        s.lastUpdated = new Date().toISOString();
        saveKey("stolenDamagedLost");
        showToast("Saved.");
        state.expandedRow = null;
        render();
      }
      break;
    }
    case "delete-stolen":
      confirmDialog("Delete this record? This action cannot be undone.", async () => {
        state.stolenDamagedLost = state.stolenDamagedLost.filter(x => x.id !== id);
        saveKey("stolenDamagedLost");
        showToast("Record deleted.");
        render();
      });
      break;
    case "export-stolen": exportStolen(); break;
  }
}

// ============= ACTIONS: MOVE TO OFFLINE =============
async function submitMoveToOffline(deviceId, fromNh) {
  const s = state.stores.find(x => x.deviceId === deviceId);
  if (!s) return;
  // Duplicate guard: a device cannot appear in Offline Devices twice
  const dup = state.offlineDevices.find(x => x.deviceId === deviceId);
  if (dup) {
    showToast("Store is already in the Offline Devices List.", "error", 4500);
    closeModal();
    return;
  }
  const deviceType = document.getElementById("mto-deviceType").value;
  const ticketRaisedDate = document.getElementById("mto-ticketRaisedDate").value;
  const currentStatus = document.getElementById("mto-currentStatus").value;
  const issueCaseNote = document.getElementById("mto-issueCaseNote").value;
  const now = new Date().toISOString();
  const dateContacted = ticketRaisedDate ? new Date(ticketRaisedDate).toISOString() : now;
  state.offlineDevices.push({
    storeName: s.storeName,
    deviceId: s.deviceId,
    deviceType,
    lastOnline: s.latestHeartbeat || now,
    movedToOfflineAt: now,
    lastChangesMade: now,
    ticketRaisedDate: ticketRaisedDate ? new Date(ticketRaisedDate).toISOString() : now,
    currentStatus,
    issueCaseNote,
    dateLastContacted: dateContacted, // default same as added date
    followUps: 1,
    fieldManager: s.fieldManager,
    fieldManagerEmail: s.fieldManagerEmail,
    comment: "",
    deviceStatusOverride: null,
  });
  // Note: we DO NOT mutate state.noHeartbeat here. The combinedNoHeartbeat() display filter
  // hides this device automatically while it is in Offline Devices, and reveals it again
  // when it leaves (e.g. once moved to Resolved Cases). This preserves the original record
  // so it can be restored on resolve without bookkeeping.
  saveKey("offlineDevices");
  closeModal();
  showToast("Moved to Offline Devices.");
}

// ============= UPLOAD STORE LIST =============
function uploadStoreList() {
  confirmDialog("Upload a new Store List? Existing devices will be updated by Device ID. New devices will be added. Continue?", () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".xlsx,.xls,.csv";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = new Uint8Array(ev.target.result);
          const wb = XLSX.read(data, { type: "array", cellDates: true });
          // Try sheet named "Weekly Update" first, else first sheet
          let sheetName = wb.SheetNames.find(n => /weekly update/i.test(n)) || wb.SheetNames[0];
          const sheet = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval: null, raw: false });
          await processUploadedRows(rows);
        } catch (err) {
          console.error(err);
          showToast("Failed to read file: " + err.message, "error");
        }
      };
      reader.readAsArrayBuffer(file);
    };
    input.click();
  });
}

async function processUploadedRows(rows) {
  // Build header mapping (case/space-insensitive)
  function keyMap(row) {
    const m = {};
    Object.keys(row).forEach(k => {
      const norm = k.toLowerCase().replace(/[^a-z0-9]/g, "");
      m[norm] = k;
    });
    return m;
  }
  if (rows.length === 0) { showToast("File has no data rows.", "error"); return; }
  const sample = keyMap(rows[0]);
  const find = (...candidates) => {
    for (const c of candidates) {
      const norm = c.toLowerCase().replace(/[^a-z0-9]/g, "");
      if (sample[norm]) return sample[norm];
    }
    return null;
  };
  const colStoreName = find("Store Name", "Store");
  const colSuffix = find("Suffix");
  const colDeviceId = find("Device ID", "DeviceID", "Device");
  const colHeartbeat = find("Latest Heartbeat", "Heartbeat", "Last Heartbeat");
  const colFM = find("Field Manager", "FM");
  const colFMEmail = find("Field Manager Email", "FM Email", "FieldManagerEmail");
  if (!colDeviceId) { showToast("Could not find a 'Device ID' column.", "error"); return; }

  const incomingIds = new Set();
  let added = 0, updated = 0;
  const now = new Date().toISOString();
  const prevIds = new Set(state.stores.map(s => s.deviceId));
  for (const row of rows) {
    const deviceId = String(row[colDeviceId] || "").trim();
    if (!deviceId) continue;
    incomingIds.add(deviceId);
    const storeName = colStoreName ? String(row[colStoreName] || "").trim() : "";
    const suffix = colSuffix ? String(row[colSuffix] || "").trim() : "";
    let heartbeat = colHeartbeat ? row[colHeartbeat] : null;
    if (heartbeat) {
      // try to parse date
      const d = new Date(heartbeat);
      heartbeat = isNaN(d) ? null : d.toISOString();
    }
    const fm = colFM ? String(row[colFM] || "").trim() : "";
    const fmEmail = colFMEmail ? String(row[colFMEmail] || "").trim() : "";
    const existing = state.stores.find(s => s.deviceId === deviceId);
    if (existing) {
      // Update only Device Status-affecting fields (latestHeartbeat) per spec
      existing.latestHeartbeat = heartbeat;
      existing.lastUpdated = now;
      // Also update FM info if provided
      if (storeName) existing.storeName = storeName;
      if (suffix) existing.suffix = suffix;
      if (fm) existing.fieldManager = fm;
      if (fmEmail) existing.fieldManagerEmail = fmEmail;
      updated++;
    } else {
      state.stores.push({
        storeName: storeName || deviceId,
        suffix,
        deviceId,
        latestHeartbeat: heartbeat || "New Device Added",
        fieldManager: fm,
        fieldManagerEmail: fmEmail,
        addedAt: now,
        lastUpdated: now,
      });
      added++;
    }
  }

  // Mark missing devices
  for (const s of state.stores) {
    if (!incomingIds.has(s.deviceId)) {
      // Only flag if this store was in the previous list and missing from new upload
      if (prevIds.has(s.deviceId) && s.latestHeartbeat !== "Device not Available from Latest Update") {
        s.latestHeartbeat = "Device not Available from Latest Update";
      }
    }
  }

  // Check Offline Devices for status updates
  let nowOnline = 0, recentOnline = 0, notInUpdate = 0;
  for (const o of state.offlineDevices) {
    const s = state.stores.find(x => x.deviceId === o.deviceId);
    if (!s) continue;
    if (!incomingIds.has(o.deviceId)) {
      o.deviceStatusOverride = "not_in_update";
      notInUpdate++;
    } else {
      const status = deviceStatusFromHeartbeat(s.latestHeartbeat);
      if (status === "Online") { o.deviceStatusOverride = "now_online"; nowOnline++; }
      else if (status === "Monitoring") { o.deviceStatusOverride = "recently_online"; recentOnline++; }
      else { /* keep current override or clear if was online */ if (o.deviceStatusOverride === "now_online" || o.deviceStatusOverride === "recently_online") o.deviceStatusOverride = null; }
    }
  }

  state.lastUpload = now;
  // Propagate updated Field Manager / FM Email from Stores → Offline/Resolved
  syncFieldManagerFromStores();
  saveAll();
  let msg = `Updated ${updated} · Added ${added}`;
  if (nowOnline) msg += ` · ${nowOnline} now Online`;
  if (recentOnline) msg += ` · ${recentOnline} recently Online`;
  if (notInUpdate) msg += ` · ${notInUpdate} not in update`;
  showToast(msg);
  render();
}

  }))), "Resolved Cases");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(combinedNoHeartbeat().map(n => ({
    "Store Name": n.storeName, "Device ID": n.deviceId, "Source": n.source, "Last Rating Collected": n.lastRatingCollected ? fmtDateShort(n.lastRatingCollected) : "",
  }))), "No Heartbeat");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.newRollout.map(r => ({
    "Store Name": r.storeName, "Device ID": r.deviceId, "Store Opening Date": fmtDateShort(r.storeOpeningDate),
  }))), "New Rollout");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(monitoringDevices().map(m => ({
    "Store Name": m.storeName, "Device ID": m.deviceId, "Current Status": m.currentStatus,
  }))), "Monitoring");
  XLSX.writeFile(wb, `dashboard_full_export_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast("Full dashboard exported.");
}
function exportDashboardPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "pt", format: "a4" });
  const stores = storesWithStatus();
  const uniq = new Set(stores.map(s => s.storeName)).size;
  const online = stores.filter(s => s.deviceStatus === "Online").length;
  const offDer = state.offlineDevices.map(offlineDeviceWithDerived);
  const backlog = offDer.filter(o => o.category === "Backlog").length;
  const ongoing = offDer.filter(o => o.category === "Ongoing ticket").length;

  doc.setFontSize(20); doc.text("Device Monitor — Dashboard Report", 40, 50);
  doc.setFontSize(10); doc.setTextColor(120); doc.text(new Date().toLocaleString(), 40, 68); doc.setTextColor(0);

  doc.setFontSize(14); doc.text("Store Overview", 40, 100);
  doc.autoTable({
    startY: 110,
    head: [["Metric", "Value"]],
    body: [
      ["Total Active Stores", String(uniq)],
      ["Total Devices", String(state.stores.length)],
      ["Online Devices", String(online)],
    ],
    styles: { fontSize: 10 },
  });

  doc.setFontSize(14); doc.text("Action Required", 40, doc.lastAutoTable.finalY + 30);
  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 40,
    head: [["Metric", "Count"]],
    body: [
      ["Total Offline Devices", String(offDer.length)],
      ["Backlog", String(backlog)],
      ["Ongoing Tickets", String(ongoing)],
      ["Monitoring (1-3 days)", String(monitoringDevices().length)],
      ["No Heartbeat / Showing Offline", String(combinedNoHeartbeat().length)],
      ["New Rollout", String(state.newRollout.length)],
    ],
    styles: { fontSize: 10 },
  });

  doc.addPage();
  doc.setFontSize(14); doc.text("Offline Devices", 40, 50);
  doc.autoTable({
    startY: 60,
    head: [["Store", "Device ID", "Type", "Days", "Category", "Issue"]],
    body: offDer.slice(0, 50).map(o => [o.storeName, o.deviceId, o.deviceType || "", o.daysOffline, o.category, o.issueCaseNote || ""]),
    styles: { fontSize: 9 },
  });

  doc.save(`dashboard_report_${new Date().toISOString().split('T')[0]}.pdf`);
  showToast("PDF report downloaded.");
}

// ============= CLEAR ALL DATA =============
async function clearAllData() {
  state.stores = [];
  state.offlineDevices = [];
  state.resolvedCases = [];
  state.noHeartbeat = [];
  state.newRollout = [];
  state.returnsToRateIt = [];
  state.resolvedReturns = [];
  state.closedSites = [];
  state.stolenDamagedLost = [];
  state.lastUpload = null;
  state.expandedRow = null;
  try {
    if (isConfigured()) await api("clear");
  } catch (e) {
    showToast("Clear failed: " + e.message, "error");
  }
}

function showSignInScreen() {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
      <div class="panel rounded-xl p-8" style="max-width:420px; width:100%; text-align:center;">

        </div>
        <h1 style="font-size:22px; font-weight:600; margin-bottom:6px;">Device Monitor</h1>
        <p class="text-dim" style="margin-bottom:24px; font-size:14px;">Sign in with your Google account to continue.</p>
        <div id="g-signin-button" style="display:flex; justify-content:center;"></div>
        <p class="text-mute" style="margin-top:20px; font-size:12px;">Only allowed accounts can access this hub. Contact your admin if you need access.</p>

  `;

  if (window.google && google.accounts && google.accounts.id) {

function showNotAllowedScreen(email) {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
      <div class="panel rounded-xl p-8" style="max-width:480px; width:100%; text-align:center; border-color:rgba(239,68,68,0.4);">

async function bootApp() {
  showBootLoading("Loading data from Google Sheets…");
  // Check admin status first (lightweight call)
  try {
    const who = await api("whoami");
    state.isAdmin = !!who.isAdmin;
  } catch (e) {
    state.isAdmin = false;
  }
  await loadState();
  await seedInitialDataIfNeeded();
  render();
  // Add UI affordances (save indicator)
  if (!document.getElementById("save-indicator")) {
    const ind = document.createElement("div");
    ind.id = "save-indicator";
    ind.style.cssText = "position:fixed; top:16px; right:16px; padding:6px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--text-dim); opacity:0; transition:opacity 0.2s; z-index:1000;";
    ind.textContent = "Saving…";
    document.body.appendChild(ind);
  }
}

(function init() {
  if (!isConfigured()) {
    showSetupScreen();
    return;
  }
  // Try to restore previous sign-in
  if (restoreAuth()) {
    bootApp();
  } else {
    showSignInScreen();
  }
})();
</script>
